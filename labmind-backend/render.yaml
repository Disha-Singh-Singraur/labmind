services:
  - type: web
    name: labmind-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: USE_REAL_AI
        value: true
      - key: UPLOAD_DIR
        value: ./uploads
      - key: DATABASE_URL
        value: sqlite:///./labmind.db
      - key: OPENAI_API_KEY
        sync: false
